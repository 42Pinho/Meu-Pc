<body class="bg-gray-100 min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto bg-white shadow-xl rounded-lg overflow-hidden">
        <header class="bg-blue-600 p-6 text-white">
            <h1 class="text-2xl font-bold">Configurador de PC Gamer</h1>
            <p class="text-blue-100">Monte seu setup e gere seu orçamento personalizado</p>
        </header>

        <main class="p-6 grid md:grid-cols-2 gap-8">
            <section id="seletor-pecas" class="space-y-4">
                <h2 class="text-xl font-semibold mb-4 text-gray-700">Escolha seus componentes</h2>
                <div id="formulario-container" class="space-y-4">
                    <p id="status-msg" class="text-gray-500 italic">Carregando componentes...</p>
                </div>
            </section>

            <section id="resumo-orcamento" class="bg-gray-50 p-6 rounded-lg border border-gray-200">
                <h2 class="text-xl font-semibold mb-4 text-gray-700">Resumo do Orçamento</h2>
                <div id="lista-itens" class="space-y-2 mb-6 text-sm"></div>
                <div class="border-t pt-4 text-xl font-bold text-gray-800">
                    Total: <span id="valor-total">R$ 0,00</span>
                </div>
                <button onclick="gerarRelatorio()" class="mt-6 w-full bg-green-600 text-white py-3 rounded-md font-bold hover:bg-green-700 transition">
                    Visualizar Relatório (Nova Aba)
                </button>
            </section>
        </main>
    </div>

    <script>
        let catalogo = {};
        const selecoes = {};

        async function carregarCatalogo() {
            try {
                const response = await fetch('catalogo.json');
                if (!response.ok) throw new Error('Falha no arquivo JSON');
                catalogo = await response.json();
                document.getElementById('status-msg').classList.add('hidden');
                renderizarFormulario();
            } catch (error) {
                console.error("Erro ao carregar catálogo:", error);
                document.getElementById('status-msg').innerText = "Erro ao carregar o arquivo catalogo.json. Certifique-se de estar usando o Live Server.";
            }
        }

        function renderizarFormulario() {
            const container = document.getElementById('formulario-container');
            for (const categoria in catalogo) {
                const div = document.createElement('div');
                div.className = "flex gap-2 items-end";
                div.innerHTML = `
                    <div class="flex-grow">
                        <label class="block text-sm font-medium text-gray-700 capitalize">${categoria.replace('_', ' ')}</label>
                        <select onchange="atualizarTotal('${categoria}', this.value)" id="select-${categoria}" class="w-full p-2 border rounded-md">
                            <option value="">Selecione...</option>
                            ${catalogo[categoria].map(item => `<option value="${item.id}">${item.nome} - R$ ${item.preco.toFixed(2)}</option>`).join('')}
                        </select>
                    </div>
                    <a href="#" id="link-${categoria}" target="_blank" class="hidden bg-gray-200 hover:bg-gray-300 p-2 rounded-md mb-0.5">🔗</a>
                `;
                container.appendChild(div);
            }
        }

        function atualizarTotal(categoria, itemId) {
            const linkBtn = document.getElementById(`link-${categoria}`);
            selecoes[categoria] = catalogo[categoria].find(i => i.id === itemId);
            
            if (selecoes[categoria] && selecoes[categoria].link) {
                linkBtn.href = selecoes[categoria].link;
                linkBtn.classList.remove('hidden');
            } else {
                linkBtn.classList.add('hidden');
            }
            
            let total = 0;
            let listaHtml = "";
            for (const cat in selecoes) {
                if (selecoes[cat]) {
                    total += selecoes[cat].preco;
                    listaHtml += `<div class="flex justify-between"><span>${selecoes[cat].nome}</span> <span>R$ ${selecoes[cat].preco.toFixed(2)}</span></div>`;
                }
            }
            document.getElementById('lista-itens').innerHTML = listaHtml;
            document.getElementById('valor-total').innerText = `R$ ${total.toFixed(2)}`;
        }
        
        function gerarRelatorio() {
            const total = document.getElementById('valor-total').innerText;
            
            // Cria um novo conteúdo HTML em memória
            let htmlContent = `
                <html>
                    <head>
                        <title>Orçamento de PC</title>
                        <style>
                            body { font-family: sans-serif; padding: 40px; line-height: 1.6; color: #333; }
                            h1 { color: #2563eb; }
                            .item { display: flex; justify-content: space-between; border-bottom: 1px solid #ddd; padding: 10px 0; }
                            .total { margin-top: 20px; font-size: 1.5em; font-weight: bold; }
                        </style>
                    </head>
                    <body>
                        <h1>Orçamento de Computador</h1>
                        <p>Data: ${new Date().toLocaleDateString()}</p>
                        <hr>
            `;

            for (const cat in selecoes) {
                if (selecoes[cat]) {
                    htmlContent += `
                        <div class="item">
                            <span><strong>${cat.toUpperCase()}:</strong> ${selecoes[cat].nome}</span>
                            <span>R$ ${selecoes[cat].preco.toFixed(2)}</span>
                        </div>
                    `;
                }
            }

            htmlContent += `<div class="total">Total: ${total}</div></body></html>`;

            // Abre uma nova janela e escreve o conteúdo
            const novaJanela = window.open("", "_blank");
            novaJanela.document.write(htmlContent);
            novaJanela.document.close(); // Finaliza a escrita
        }

        carregarCatalogo();
    </script>
</body>
</html>
